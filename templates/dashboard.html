<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚水潭数据大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e27;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景粒子效果 */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 255, 127, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* 顶部装饰线 */
        .top-border {
            height: 3px;
            background: linear-gradient(90deg, transparent, #00d4ff, #8a2be2, #00ff7f, transparent);
            animation: borderFlow 3s linear infinite;
        }

        @keyframes borderFlow {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .dashboard { padding: 15px 25px; max-width: 1920px; margin: 0 auto; }

        /* 标题 */
        .title-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            position: relative;
        }

        .title-bar::before, .title-bar::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d4ff);
        }

        .title-bar::after {
            background: linear-gradient(90deg, #00d4ff, transparent);
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            padding: 0 30px;
            background: linear-gradient(90deg, #00d4ff, #8a2be2, #00ff7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        .title-time {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #00d4ff;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08) 0%, rgba(138, 43, 226, 0.05) 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 20px 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(0, 212, 255, 0.1), transparent);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .stat-box .icon {
            font-size: 28px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .stat-box .label {
            font-size: 12px;
            color: #7ec8e3;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .stat-box .value {
            font-size: 28px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px currentColor; }
            to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
        }

        .stat-box .unit {
            font-size: 12px;
            color: #7ec8e3;
            position: relative;
            z-index: 1;
        }

        .stat-box.cyan .value { color: #00d4ff; }
        .stat-box.purple .value { color: #8a2be2; }
        .stat-box.green .value { color: #00ff7f; }
        .stat-box.orange .value { color: #ff9800; }
        .stat-box.pink .value { color: #ff6b9d; }
        .stat-box.yellow .value { color: #ffd700; }

        /* 图表区域 */
        .charts-row {
            display: grid;
            grid-template-columns: 5fr 3fr 3fr;
            gap: 15px;
            margin: 15px 0;
        }

        .chart-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(138, 43, 226, 0.03) 100%);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .chart-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, transparent);
        }

        .chart-box h3 {
            font-size: 15px;
            color: #00d4ff;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid #8a2be2;
        }

        /* 数据表格 */
        .table-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .table-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(138, 43, 226, 0.03) 100%);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 18px;
        }

        .table-box h3 {
            font-size: 15px;
            color: #00d4ff;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid #00ff7f;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            text-align: left;
            font-size: 13px;
            color: #7ec8e3;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        tr:hover { background: rgba(0, 212, 255, 0.05); }

        .profit { color: #00ff7f; font-weight: bold; }
        .loss { color: #ff6b6b; }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 15px;
            right: 25px;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.4);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            z-index: 100;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* 底部装饰线 */
        .bottom-border {
            height: 2px;
            background: linear-gradient(90deg, transparent, #8a2be2, #00d4ff, #00ff7f, transparent);
            margin-top: 20px;
        }

        /* 数字滚动动画 */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: countUp 0.6s ease-out forwards; }

        /* 脉冲点 */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff7f;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 127, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(0, 255, 127, 0); }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    <div class="top-border"></div>

    <a href="/" class="back-btn">← 返回管理后台</a>

    <div class="dashboard">
        <div class="title-bar">
            <div class="title">聚 水 潭 数 据 大 屏</div>
            <div class="title-time"><span class="pulse-dot"></span>实时数据</div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-box cyan">
                <div class="icon">📦</div>
                <div class="label">总订单数</div>
                <div class="value" id="totalOrders">--</div>
                <div class="unit">笔</div>
            </div>
            <div class="stat-box purple">
                <div class="icon">💰</div>
                <div class="label">总销售额</div>
                <div class="value" id="totalAmount">--</div>
                <div class="unit">万元</div>
            </div>
            <div class="stat-box green">
                <div class="icon">📈</div>
                <div class="label">分销利润</div>
                <div class="value" id="totalProfit">--</div>
                <div class="unit">元</div>
            </div>
            <div class="stat-box orange">
                <div class="icon">🔗</div>
                <div class="label">分销订单</div>
                <div class="value" id="distOrders">--</div>
                <div class="unit">笔</div>
            </div>
            <div class="stat-box pink">
                <div class="icon">🏪</div>
                <div class="label">合作店铺</div>
                <div class="value" id="shopCount">--</div>
                <div class="unit">家</div>
            </div>
            <div class="stat-box yellow">
                <div class="icon">📊</div>
                <div class="label">今日订单</div>
                <div class="value" id="todayOrders">--</div>
                <div class="unit">笔</div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="charts-row">
            <div class="chart-box">
                <h3>📈 月度销售与利润趋势</h3>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>🏪 店铺销售额 TOP10</h3>
                <canvas id="shopChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>📊 订单状态分布</h3>
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <!-- 表格 -->
        <div class="table-row">
            <div class="table-box">
                <h3>🏆 店铺利润排行</h3>
                <table>
                    <thead>
                        <tr><th>店铺</th><th>订单数</th><th>销售额</th><th>利润</th><th>利润率</th></tr>
                    </thead>
                    <tbody id="profitTable"></tbody>
                </table>
            </div>
            <div class="table-box">
                <h3>📅 月度数据明细</h3>
                <table>
                    <thead>
                        <tr><th>月份</th><th>订单数</th><th>销售额</th><th>利润</th><th>利润率</th></tr>
                    </thead>
                    <tbody id="monthlyTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-border"></div>

    <script>
    async function loadData() {
        try {
            const res = await fetch('/api/dashboard/data');
            const data = await res.json();

            // 数字动画
            animateNumber('totalOrders', data.total.total_orders);
            animateNumber('totalAmount', (data.total.total_amount / 10000).toFixed(1));
            animateNumber('totalProfit', data.total.total_profit.toFixed(0));
            animateNumber('distOrders', data.total.dist_orders);
            animateNumber('shopCount', data.shops.length);
            document.getElementById('todayOrders').textContent = data.today.orders;

            // 趋势图
            if (data.monthly.length > 0) {
                const ctx = document.getElementById('trendChart').getContext('2d');
                const gradient1 = ctx.createLinearGradient(0, 0, 0, 300);
                gradient1.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
                gradient1.addColorStop(1, 'rgba(0, 212, 255, 0)');
                const gradient2 = ctx.createLinearGradient(0, 0, 0, 300);
                gradient2.addColorStop(0, 'rgba(0, 255, 127, 0.3)');
                gradient2.addColorStop(1, 'rgba(0, 255, 127, 0)');

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.monthly.map(d => d.month),
                        datasets: [
                            { label: '销售额(万)', data: data.monthly.map(d => (d.amount/10000).toFixed(1)),
                              borderColor: '#00d4ff', backgroundColor: gradient1, fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#00d4ff' },
                            { label: '利润(万)', data: data.monthly.map(d => (d.profit/10000).toFixed(2)),
                              borderColor: '#00ff7f', backgroundColor: gradient2, fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#00ff7f' }
                        ]
                    },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#7ec8e3' } } },
                        scales: { x: { ticks: { color: '#7ec8e3' }, grid: { color: 'rgba(0,212,255,0.1)' } },
                                  y: { ticks: { color: '#7ec8e3' }, grid: { color: 'rgba(0,212,255,0.1)' } } } }
                });
            }

            // 店铺TOP10
            if (data.shops.length > 0) {
                new Chart(document.getElementById('shopChart'), {
                    type: 'bar',
                    data: {
                        labels: data.shops.map(s => s.shop_name.length > 6 ? s.shop_name.substring(0,6)+'..' : s.shop_name),
                        datasets: [{ data: data.shops.map(s => s.amount),
                            backgroundColor: ['#00d4ff','#8a2be2','#00ff7f','#ff9800','#ff6b9d','#ffd700','#00bcd4','#e91e63','#9c27b0','#3f51b5'],
                            borderRadius: 4 }]
                    },
                    options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } },
                        scales: { x: { ticks: { color: '#7ec8e3' }, grid: { color: 'rgba(0,212,255,0.1)' } },
                                  y: { ticks: { color: '#7ec8e3', font: { size: 11 } }, grid: { display: false } } } }
                });
            }

            // 状态分布
            if (data.status.length > 0) {
                const colorMap = {'Cancelled':'#ff6b6b','Shipped':'#00d4ff','Sent':'#00d4ff',
                                  'Finished':'#00ff7f','Completed':'#00ff7f','WaitCheck':'#ff9800'};
                const nameMap = {'Cancelled':'已取消','Shipped':'已发货','Sent':'已发货',
                                'Finished':'已完成','Completed':'已完成','WaitCheck':'待审核','WaitOuterSent':'待发出','WaitConfirm':'待确认','Question':'异常'};
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: data.status.map(s => nameMap[s.status] || s.status),
                        datasets: [{ data: data.status.map(s => s.cnt),
                            backgroundColor: data.status.map(s => colorMap[s.status] || '#9e9e9e'),
                            borderWidth: 0 }]
                    },
                    options: { responsive: true, cutout: '60%',
                        plugins: { legend: { position: 'right', labels: { color: '#7ec8e3', padding: 12 } } } }
                });
            }

            // 店铺利润表
            const pt = document.getElementById('profitTable');
            pt.innerHTML = data.shops.map(s => {
                const rate = s.amount > 0 ? (s.profit / s.amount * 100).toFixed(1) : '0.0';
                return `<tr><td>${s.shop_name}</td><td>${s.order_count}</td><td>¥${s.amount.toLocaleString()}</td>
                    <td class="${s.profit >= 0 ? 'profit' : 'loss'}">¥${s.profit.toFixed(2)}</td><td>${rate}%</td></tr>`;
            }).join('');

            // 月度明细表
            const mt = document.getElementById('monthlyTable');
            mt.innerHTML = data.monthly.map(m => {
                const rate = m.amount > 0 ? (m.profit / m.amount * 100).toFixed(1) : '0.0';
                return `<tr><td>${m.month}</td><td>${m.orders}</td><td>¥${m.amount.toLocaleString()}</td>
                    <td class="profit">¥${m.profit.toFixed(2)}</td><td>${rate}%</td></tr>`;
            }).join('');

        } catch(e) { console.error('加载失败:', e); }
    }

    function animateNumber(id, target) {
        const el = document.getElementById(id);
        const num = parseFloat(target);
        if (isNaN(num)) { el.textContent = target; return; }
        let current = 0;
        const step = num / 30;
        const timer = setInterval(() => {
            current += step;
            if (current >= num) { current = num; clearInterval(timer); }
            el.textContent = Number.isInteger(num) ? Math.floor(current).toLocaleString() : current.toFixed(1);
        }, 30);
    }

    loadData();
    setInterval(loadData, 60000);
    </script>
</body>
</html>
